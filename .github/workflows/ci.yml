name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'plans/**'
  merge_group:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      site: ${{ steps.filter.outputs.site }}
      studio: ${{ steps.filter.outputs.studio }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            site:
              - 'app/**'
              - '!app/studio/**'
              - '!app/video-to-gif/**'
              - 'content/**'
              - 'hooks/**'
              - 'lib/**'
              - '!lib/studio/**'
              - 'public/**'
              - 'tests/**'
              - '!tests/studio.spec.ts'
              - '!tests/video-to-gif-accessibility.spec.ts'
              - '!tests/video-to-gif-seo.spec.ts'
              - '!tests/fixtures/**'
              - 'instrumentation-client.ts'
              - 'mdx-components.tsx'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'playwright.config.ts'
              - 'postcss.config.mjs'
              - 'tailwind.config.ts'
              - 'tsconfig.json'
              - '.github/actions/**'
              - '.github/workflows/**'
            studio:
              - 'app/studio/**'
              - 'app/video-to-gif/**'
              - 'app/globals.css'
              - 'app/layout.tsx'
              - 'lib/studio/**'
              - 'lib/constants.ts'
              - 'lib/schema.ts'
              - 'tests/studio.spec.ts'
              - 'tests/video-to-gif-accessibility.spec.ts'
              - 'tests/video-to-gif-seo.spec.ts'
              - 'tests/fixtures/**'
              - 'instrumentation-client.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'playwright.config.ts'
              - 'postcss.config.mjs'
              - 'tailwind.config.ts'
              - 'tsconfig.json'
              - '.github/actions/**'
              - '.github/workflows/**'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Check the production dependency graph
        run: npm run knip:production

      - name: Check CI path boundaries
        run: npm run verify:ci-boundaries

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 14

  build-test-app:
    name: Build Test Application
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, quality]
    if: >-
      always() && !cancelled() && needs.quality.result == 'success' &&
      (github.event_name == 'merge_group' ||
       needs.detect-changes.outputs.site == 'true' ||
       needs.detect-changes.outputs.studio == 'true')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - name: Build test application
        run: npm run build

      - name: Upload static test application
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-application
          path: out/
          retention-days: 1

  site-browser-tests:
    name: Site Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes, build-test-app]
    if: >-
      always() && !cancelled() && needs.build-test-app.result == 'success' &&
      (github.event_name == 'merge_group' || needs.detect-changes.outputs.site == 'true')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-application
          path: out/

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Start static test server
        run: |
          npx serve out -l 3217 > /tmp/ytgify-serve.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl --fail --silent http://localhost:3217/ > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/ytgify-serve.log
          exit 1

      - name: Run landing, blog, and welcome tests
        run: npx playwright test tests/smoke.spec.ts tests/blog-seo.spec.ts tests/welcome.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3217

  studio-browser-tests:
    name: Studio Browser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes, build-test-app]
    if: >-
      always() && !cancelled() && needs.build-test-app.result == 'success' &&
      (github.event_name == 'merge_group' || needs.detect-changes.outputs.studio == 'true')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-application
          path: out/

      - name: Install browser matrix
        run: npx playwright install chromium firefox webkit --with-deps

      - name: Start static test server
        run: |
          npx serve out -l 3217 > /tmp/ytgify-serve.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl --fail --silent http://localhost:3217/video-to-gif > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/ytgify-serve.log
          exit 1

      - name: Run video-to-GIF workflow, accessibility, and SEO tests
        run: npx playwright test tests/studio.spec.ts tests/video-to-gif-accessibility.spec.ts tests/video-to-gif-seo.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3217

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [quality, build-test-app, site-browser-tests, studio-browser-tests]
    steps:
      - name: Require successful or intentionally skipped jobs
        env:
          RESULTS: >-
            ${{ needs.quality.result }}
            ${{ needs.build-test-app.result }}
            ${{ needs.site-browser-tests.result }}
            ${{ needs.studio-browser-tests.result }}
        run: |
          echo "Job results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" = 'failure' ] || [ "$result" = 'cancelled' ]; then
              echo "A required job reported: $result"
              exit 1
            fi
          done
          echo 'All required jobs passed or were intentionally skipped.'
