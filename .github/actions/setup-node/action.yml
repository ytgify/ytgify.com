name: Setup Node.js
description: Install Node 24 and the locked project dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '24'
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
